<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kopi Lokal Nusantara - Premium Coffee</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script type="module" crossorigin src="/assets/index-1de89aaf.js"></script>
    <link rel="stylesheet" href="/assets/index-3cafb8e0.css">
  </head>
  <body>
    <!-- App Container -->
    <div id="app">
      <!-- Header -->
      <header class="header glass">
        <div class="header-container">
          <h1 class="logo">Kopi Lokal Nusantara</h1>
          <div class="cart-icon-wrapper" id="open-cart-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M16 11V7C16 4.79086 14.2091 3 12 3C9.79086 3 8 4.79086 8 7V11M5 9H19L20 21H4L5 9Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="cart-badge" id="cart-badge">0</span>
          </div>
        </div>
      </header>

      <!-- Hero Section -->
      <section class="hero">
        <div class="hero-content">
          <h2>Kopi Asli dari Kebun Terbaik Nusantara</h2>
          <p>Beli kopi lokal favoritmu, diskusikan langsung dengan kami via WhatsApp.</p>
        </div>
      </section>

      <!-- Product Grid -->
      <main class="main-content">
        <h3 class="section-title">Katalog Produk</h3>
        <div class="product-grid" id="product-grid">
          <!-- Products will be injected here via JS -->
        </div>
      </main>

      <!-- Cart Drawer -->
      <div class="cart-drawer-overlay" id="cart-drawer-overlay"></div>
      <aside class="cart-drawer glass" id="cart-drawer">
        <div class="cart-header">
          <h2>Keranjang Belanja</h2>
          <button class="close-btn" id="close-cart-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="cart-items" id="cart-items">
          <!-- Cart items will be injected here -->
          <div class="empty-cart-message">Keranjang Anda masih kosong.</div>
        </div>
        <div class="cart-footer glass">
          <div class="cart-total">
            <span>Total:</span>
            <span class="total-price" id="cart-total-price">Rp 0</span>
          </div>
          <button class="checkout-btn" id="checkout-btn">
            Pesan via WhatsApp
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.472 14.382C17.318 14.305 16.551 13.922 16.398 13.845C16.244 13.768 16.128 13.73 16.012 13.882C15.897 14.035 15.551 14.457 15.454 14.572C15.358 14.686 15.261 14.706 15.108 14.629C14.954 14.553 14.451 14.389 13.855 13.854C13.385 13.433 13.064 12.923 12.968 12.77C12.871 12.617 12.958 12.532 13.035 12.456C13.104 12.387 13.19 12.273 13.267 12.186C13.344 12.099 13.37 12.042 13.421 11.927C13.473 11.812 13.447 11.716 13.409 11.64C13.37 11.563 13.064 10.8 12.937 10.493C12.81 10.187 12.684 10.225 12.684 10.225H12.453C12.338 10.225 12.146 10.263 11.993 10.416C11.839 10.569 11.398 10.989 11.398 11.85C11.398 12.71 11.859 13.535 11.916 13.611C11.973 13.688 13.064 15.452 14.78 16.191C15.188 16.367 15.516 16.472 15.772 16.55C16.182 16.68 16.564 16.662 16.852 16.621C17.18 16.574 17.864 16.2 18.006 15.779C18.147 15.358 18.147 15.012 18.109 14.936C18.07 14.86 17.954 14.821 17.8 14.745C17.647 14.669 17.472 14.382 17.472 14.382ZM11.998 21.082H11.996C10.547 21.081 9.13 20.692 7.892 19.957L7.697 19.841L4.852 20.588L5.613 17.81L5.485 17.607C4.678 16.324 4.252 14.836 4.254 13.303C4.259 8.973 7.788 5.447 12.115 5.447C14.215 5.447 16.189 6.265 17.674 7.751C19.158 9.237 19.976 11.213 19.976 13.313C19.976 17.644 16.446 21.171 12.115 21.171M12.115 3.5C6.702 3.5 2.308 7.893 2.308 13.306C2.308 15.034 2.76 16.711 3.606 18.175L2 24L7.962 22.434C9.378 23.208 10.999 23.616 12.651 23.616H12.654C18.067 23.616 22.462 19.223 22.462 13.311C22.462 10.686 21.441 8.219 19.585 6.363C17.728 4.506 15.26 3.5 12.635 3.5H12.115Z" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </aside>
    </div>

    <!-- Floating Mobile Checkout (Sticky Bottom) when items > 0 -->
    <div class="floating-checkout glass" id="floating-checkout">
      <div class="floating-info">
        <span id="floating-cart-count">0 Item</span>
        <span class="floating-total-price" id="floating-total-price">Rp 0</span>
      </div>
      <button class="open-cart-floating-btn" id="open-cart-floating-btn">Lihat Keranjang</button>
    </div>

    
  </body>
</html>
